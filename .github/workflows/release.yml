name: "Release"

on:
  release:
    types:
      - published

jobs:
  artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Build and Tag Docker Image
        run: make build-image

      - name: Extract Binary
        run: |
          docker create --name artifacts sentinel-dvpncli:latest
          docker cp artifacts:/usr/local/bin/dvpncli ./sentinel-dvpncli
          docker rm artifacts

      - name: Generate SHA256 Checksum
        run: sha256sum sentinel-dvpncli > ./checksums.txt

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@5be0e66d93ac7ed76da52eca8bb058f665c3a5fe #v2.4.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            checksums.txt
            sentinel-dvpncli
